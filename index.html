<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automa8 | Automate What You Don't Want To Do</title>
  <meta name="description" content="If it's something you need to do but don't want to do, there's a good chance we can automate it.">
  <meta property="og:title" content="Automa8 | Automate What You Don't Want To Do">
  <meta property="og:description" content="If it's something you need to do but don't want to do, there's a good chance we can automate it.">
  <meta property="og:type" content="website">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#0F172A">
  <meta property="og:image" content="og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #0F172A;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== HERO SECTION ===== */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      min-height: 100vh;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-color: #0F172A;
    }

    .hero-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      border-radius: 50%;
      opacity: 0.2;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.4) 0%, rgba(37, 99, 235, 0.1) 40%, transparent 70%);
      pointer-events: none;
    }

    .hero-grid {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image:
        linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 10;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px;
      text-align: center;
    }

    /* App Icon */
    .icon-wrapper {
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      animation: fadeScaleIn 0.8s ease-out forwards;
    }

    .icon-container {
      position: relative;
      width: 72px;
      height: 72px;
      animation: iconFloat 4s ease-in-out infinite;
    }

    .icon-glow {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: rgba(37, 99, 235, 0.2);
      filter: blur(20px);
      animation: pulseGlow 2s ease-in-out infinite;
    }

    .icon-container img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(37, 99, 235, 0.3));
    }

    /* Logo */
    .logo-wrapper {
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeSlideDown 0.8s ease-out 0.1s forwards;
    }

    .logo-wrapper img {
      width: 180px;
      height: auto;
    }

    /* Headline */
    .headline {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(28px, 5vw, 56px);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      color: #FFFFFF;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeSlideUp 0.8s ease-out 0.3s forwards;
    }

    .headline .accent {
      background: linear-gradient(110deg, #2563EB 0%, #2563EB 35%, #60a5fa 50%, #2563EB 65%, #2563EB 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s ease-in-out infinite;
    }

    /* Subheadline */
    .subheadline {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(18px, 3vw, 30px);
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeSlideUp 0.8s ease-out 0.5s forwards;
    }

    /* CTA Button */
    .cta-wrapper {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeSlideUp 0.8s ease-out 0.7s forwards;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background-color: #2563EB;
      color: #FFFFFF;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 600;
      padding: 16px 40px;
      border-radius: 50px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .cta-button:hover {
      background-color: #1d4ed8;
      box-shadow: 0 0 30px rgba(37, 99, 235, 0.4);
      transform: scale(1.02);
    }

    .cta-button:active {
      transform: scale(0.98);
    }

    .cta-button svg {
      width: 20px;
      height: 20px;
      transition: transform 0.3s ease;
    }

    .cta-button:hover svg {
      transform: translateX(4px);
    }

    /* Floating dots */
    /* Particle canvas */
    .particle-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.6;
    }

    /* ===== FOOTER ===== */
    footer {
      position: relative;
      z-index: 10;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      background-color: #0F172A;
    }

    .footer-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .footer-copy {
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
    }

    .footer-link {
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer-link:hover {
      color: #2563EB;
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeSlideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeSlideDown {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    @keyframes fadeScaleIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes shimmer {
      0% { background-position: 100% 50%; }
      100% { background-position: -100% 50%; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .hero-content {
        padding: 40px 20px;
      }

      .icon-container {
        width: 56px;
        height: 56px;
      }

      .icon-wrapper {
        margin-bottom: 16px;
      }

      .icon-glow {
        filter: blur(12px);
      }

      .logo-wrapper {
        margin-bottom: 28px;
      }

      .logo-wrapper img {
        width: 150px;
      }

      .headline {
        margin-bottom: 16px;
      }

      .subheadline {
        margin-bottom: 32px;
      }

      .cta-button {
        padding: 14px 32px;
      }

      .footer-inner {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-glow"></div>
    <div class="hero-grid"></div>
    <canvas id="particles" class="particle-canvas"></canvas>

    <div class="hero-content">
      <div class="icon-wrapper">
        <div class="icon-container">
          <div class="icon-glow"></div>
          <img src="automa8_app_icon.png" alt="Automa8 icon">
        </div>
      </div>

      <div class="logo-wrapper">
        <img src="automa8_white_logo.png" alt="Automa8 - Automation and AI Workflow Solutions">
      </div>

      <h1 class="headline">
        If it&rsquo;s something you need to do but don&rsquo;t want to do,
        <span class="accent">there&rsquo;s a good chance we can automate it.</span>
      </h1>

      <p class="subheadline">Let&rsquo;s find out.</p>

      <div class="cta-wrapper">
        <!-- ✏️ CHANGE YOUR BOOKING URL HERE -->
        <a href="#" class="cta-button" target="_blank" rel="noopener noreferrer">
          Book Now
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
          </svg>
        </a>
      </div>
    </div>
  </section>

  <footer>
    <div class="footer-inner">
      <p class="footer-copy">&copy; 2026 Automa8. All rights reserved.</p>
      <a href="mailto:hello@automa8.com" class="footer-link">Contact</a>
    </div>
  </footer>

  <script>
    (function() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      const isMobile = window.innerWidth < 640;
      const PARTICLE_COUNT = isMobile ? 18 : 40;
      const CONNECTION_DISTANCE = isMobile ? 120 : 150;
      const BLUE = { r: 37, g: 99, b: 235 };
      let particles = [];

      function resize() {
        canvas.width = canvas.offsetWidth * window.devicePixelRatio;
        canvas.height = canvas.offsetHeight * window.devicePixelRatio;
        ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
      }

      function initParticles() {
        const w = canvas.offsetWidth, h = canvas.offsetHeight;
        particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          particles.push({
            x: Math.random() * w, y: Math.random() * h,
            vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4,
            radius: Math.random() * 2 + 1, opacity: Math.random() * 0.4 + 0.1
          });
        }
      }

      function draw() {
        const w = canvas.offsetWidth, h = canvas.offsetHeight;
        ctx.clearRect(0, 0, w, h);
        for (const p of particles) {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
        }
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < CONNECTION_DISTANCE) {
              const alpha = (1 - dist / CONNECTION_DISTANCE) * 0.15;
              ctx.beginPath();
              ctx.strokeStyle = 'rgba(' + BLUE.r + ',' + BLUE.g + ',' + BLUE.b + ',' + alpha + ')';
              ctx.lineWidth = 0.5;
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(' + BLUE.r + ',' + BLUE.g + ',' + BLUE.b + ',' + p.opacity + ')';
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }

      resize(); initParticles(); draw();
      window.addEventListener('resize', function() { resize(); initParticles(); });
    })();
  </script>
</body>
</html>
